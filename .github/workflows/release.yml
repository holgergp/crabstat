  name: Release
  on:
    push:
      tags:
        - 'v*'  # triggers on version tags like v0.1.0

  jobs:
    build:
      strategy:
        matrix:
          include:
            - os: ubuntu-latest
              target: x86_64-unknown-linux-gnu
              artifact: crabstat-linux-amd64
            - os: macos-latest
              target: aarch64-apple-darwin
              artifact: crabstat-macos-arm64
            - os: macos-13
              target: x86_64-apple-darwin
              artifact: crabstat-macos-amd64
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v4
        - uses: dtolnay/rust-toolchain@stable
          with:
            targets: ${{ matrix.target }}
        - run: cargo build --release --target ${{ matrix.target }}
        - run: cp target/${{ matrix.target }}/release/cs ${{ matrix.artifact }}
        - uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.artifact }}
            path: ${{ matrix.artifact }}

    release:
      needs: build
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/download-artifact@v4
        - uses: softprops/action-gh-release@v2
          with:
            files: |
              crabstat-linux-amd64/crabstat-linux-amd64
              crabstat-macos-arm64/crabstat-macos-arm64
              crabstat-macos-amd64/crabstat-macos-amd64